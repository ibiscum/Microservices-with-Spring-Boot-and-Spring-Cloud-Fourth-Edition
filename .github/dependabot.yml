# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "monthly"
  - package-ecosystem: "gradle" # See documentation for possible values
    directory: "/Chapter03/1-spring-init" # Location of package manifests
    schedule:
      interval: "monthly"
  - package-ecosystem: "gradle" # See documentation for possible values
    directory: "/Chapter03/2-basic-rest-services" # Location of package manifests
    schedule:
      interval: "monthly"
  - package-ecosystem: "gradle" # See documentation for possible values
    directory: "/Chapter04" # Location of package manifests
    schedule:
      interval: "monthly"
  - package-ecosystem: "gradle" # See documentation for possible values
    directory: "/Chapter05" # Location of package manifests
    schedule:
      interval: "monthly"
  - package-ecosystem: "gradle" # See documentation for possible values
    directory: "/Chapter06" # Location of package manifests
    schedule:
      interval: "monthly"


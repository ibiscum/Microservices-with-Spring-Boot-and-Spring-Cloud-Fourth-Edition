name: Conditional Multi-Project Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 1. SCHRITT: Änderungen erkennen
  changes:
    runs-on: ubuntu-latest
    outputs:
      # Hier definieren wir Variablen für die nachfolgenden Jobs
      projects: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Definiere hier deine Projektordner und die Pfade, auf die sie reagieren
          filters: |
            ch03-init: 'Chapter03/1-spring-init/**'
            ch03-basic: 'Chapter03/2-basic-rest-services/**'
            ch04: 'Chapter04/**'

  # 2. SCHRITT: Tests nur für geänderte Projekte ausführen
  test:
    needs: changes
    # Der Job wird nur gestartet, wenn mindestens ein Projekt geändert wurde
    if: ${{ needs.changes.outputs.projects != '[]' && needs.changes.outputs.projects != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Die Matrix wird dynamisch aus den erkannten Änderungen befüllt
        project: ${{ fromJSON(needs.changes.outputs.projects) }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-root-directory: ./${{ matrix.project }}

      - name: Run Tests in ${{ matrix.project }}
        working-directory: ./${{ matrix.project }}
        run: |
          chmod +x gradlew
          ./gradlew test

      - name: Upload Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: report-${{ matrix.project }}
          path: ./${{ matrix.project }}/build/reports/tests/test

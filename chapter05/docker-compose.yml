name: chapter05
services:
  product:
    image: ch05-product-service:1.0.0-SNAPSHOT
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    mem_limit: 512m

  product-composite:
    image: ch05-product-composite-service:1.0.0-SNAPSHOT
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - '127.0.0.1:8080:8080'
    mem_limit: 512m

  recommendation:
    image: ch05-recommendation-service:1.0.0-SNAPSHOT
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    mem_limit: 512m

  review:
    image: ch05-review-service:1.0.0-SNAPSHOT
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    mem_limit: 512m
